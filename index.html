<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期末刷题宝典 Ultra</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="打开题库菜单">☰</button>
    <div>
      <h1>期末刷题宝典</h1>
      <div class="sub-info" id="hdrSub">加载中...</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-import" onclick="openImport()">+ 导入</button>
  </div>
</div>

<!-- 侧栏遮罩 -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- 侧栏 -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> 题库</h3>
    <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
  </div>
  <div class="sidebar-body">
    <div class="sidebar-section-label">题库列表</div>
    <div class="sidebar-banks" id="sidebarBanks"></div>
    <button class="sidebar-import" onclick="openImport();toggleSidebar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      导入题库
    </button>
  </div>
  <div class="sidebar-footer">
    <div class="sidebar-stats" id="sidebarStats"></div>
  </div>
</div>

<div class="container">
  <div class="stats-row" id="statsRow">
    <div class="stat-card total"><div class="num" id="stTotal">0</div><div class="lbl">总题数</div></div>
    <div class="stat-card right"><div class="num" id="stRight">0</div><div class="lbl">已答对</div></div>
    <div class="stat-card wrong"><div class="num" id="stWrong">0</div><div class="lbl">错题</div></div>
    <div class="stat-card"><div class="num" id="stFav">0</div><div class="lbl">收藏</div></div>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="practice" onclick="setMode('practice')">顺序练习</div>
    <div class="mode-tab" data-mode="random" onclick="setMode('random')">随机刷题</div>
    <div class="mode-tab" data-mode="wrong" onclick="setMode('wrong')">错题本</div>
    <div class="mode-tab" data-mode="fav" onclick="setMode('fav')">收藏夹</div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="content"></div>
</div>

<div class="qmap-overlay" id="qmapOverlay" onclick="closeQmap(event)">
  <div class="qmap-panel" onclick="event.stopPropagation()">
    <h3 id="qmapTitle">题目导航</h3>
    <div class="qmap-grid" id="qmapGrid"></div>
    <button class="qmap-close" onclick="closeQmap()">关闭</button>
  </div>
</div>

<div class="modal-overlay" id="importOverlay" onclick="closeImport(event)">
  <div class="modal-panel" onclick="event.stopPropagation()">
    <h3>导入题库</h3>
    <div id="importBody">
      <p style="font-size:13px;margin-bottom:10px">支持 Markdown (.md)、Word (.docx)、PDF (.pdf) 格式。</p>
      <input type="file" id="importFile" accept=".md,.docx,.pdf" style="margin-bottom:10px">
      <div id="importStatus" style="display:none;font-size:13px;color:#4a90d9;margin-bottom:8px"></div>
      <input type="text" id="importName" placeholder="题库名称（可选）" style="width:100%;padding:8px;border:1px solid #d0d0d0;border-radius:6px;font-size:13px;margin-bottom:10px">
      <div id="importPreview" style="display:none"></div>
      <div id="importActions" style="display:none;margin-top:10px">
        <button onclick="confirmImport()" style="padding:8px 20px;background:#4a90d9;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">确认导入</button>
        <button onclick="cancelImport()" style="padding:8px 20px;border:1px solid #d0d0d0;border-radius:6px;cursor:pointer;font-size:13px;margin-left:8px">取消</button>
      </div>
    </div>
    <button class="modal-close" onclick="closeImport()">关闭</button>
  </div>
</div>

<div class="modal-overlay" id="editAnswerOverlay" onclick="closeEditAnswer(event)">
  <div class="modal-panel" onclick="event.stopPropagation()">
    <h3>编辑答案</h3>
    <div id="editAnswerBody"></div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button onclick="confirmEditAnswer()" style="padding:8px 20px;background:#4a90d9;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">保存</button>
      <button onclick="resetEditAnswer()" style="padding:8px 20px;border:1px solid #ffccc7;background:#fff2f0;color:#cf1322;border-radius:6px;cursor:pointer;font-size:13px">恢复默认</button>
      <button onclick="closeEditAnswer()" style="padding:8px 20px;border:1px solid #d0d0d0;border-radius:6px;cursor:pointer;font-size:13px">取消</button>
    </div>
  </div>
</div>

<script src="lib/mammoth.min.js"></script>
<script src="lib/pdf.min.js"></script>
<script src="js/parser-md.js"></script>
<script src="js/parser-docx.js"></script>
<script src="js/parser-pdf.js"></script>
<script src="js/app.js"></script>
</body>
</html>
